# docker-compose.yml

services:
  db:
    # PostgreSQL 17 (Latest Stable) with lightweight Alpine Linux
    image: postgres:17-alpine
    container_name: cex_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cex_db
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run once on first container start (alphabetical order)
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cex_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cex_net

  backend:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: cex_backend
    restart: always
    environment:
      DATABASE_URL: postgres://admin:admin@db:5432/cex_db
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - cex_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: cex_web
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - cex_net

networks:
  cex_net:
    driver: bridge

volumes:
  pgdata: